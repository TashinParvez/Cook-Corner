<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allergy Input with Suggestions</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
<style> 
    .allergy-label i {
        display: none;
        margin-left: 0.5em;
    }
 
    .allergy-label:hover i {
        display: inline;
    }

    .allergy-label {
        display: inline-block;
        padding: 0.3em 0.6em;
        margin: 0.2em;
        font-size: 14px;
        background-color: #e0e0e0;
        border-radius: 0.25em;
        position: relative;
        /* Add this to properly position the cross button */
    }

    .allergy-label i {
        display: none;
        margin-left: 0.5em;
        cursor: pointer;
    }

    .allergy-label:hover i {
        display: inline;
        /* Show cross button on hover */
    }

    .allergy-input {
        border: none;
        outline: none;
        width: 100%;
        padding: 0.5em;
    }

    .allergy-container {
        display: flex;
        flex-wrap: wrap;
        border: 1px solid #ced4da;
        border-radius: 0.25em;
        padding: 0.5em;
        position: relative;
    }

    .suggestions {
        position: absolute;
        background-color: white;
        border: 1px solid #ced4da;
        max-height: 150px;
        width: 100%;
        overflow-y: auto;
        z-index: 1000;
    }

    .suggestions div {
        padding: 0.5em;
        cursor: pointer;
    }

    .suggestions div:hover {
        background-color: #f1f1f1;
    }
</style>
</head>

<body>

    <div class="container mt-5">
        <h4>Add Allergies</h4>
        <div class="allergy-container" id="allergy-container">
            <input type="text" class="allergy-input" id="allergy-input" placeholder="Type and press Enter to add">
            <div class="suggestions" id="suggestions"></div>
        </div>
    </div>

    <script>
        const allergyInput = document.getElementById('allergy-input');
        const allergyContainer = document.getElementById('allergy-container');
        const suggestionsBox = document.getElementById('suggestions');

        const commonAllergies = ['Peanuts', 'Dairy', 'Gluten', 'Shellfish', 'Soy', 'Wheat', 'Tree Nuts', 'Eggs', 'Fish', 'Sesame'];

        allergyInput.addEventListener('input', function () {
            const input = allergyInput.value.trim().toLowerCase();
            if (input) {
                const filteredSuggestions = commonAllergies.filter(allergy => allergy.toLowerCase().includes(input));
                displaySuggestions(filteredSuggestions);
            } else {
                suggestionsBox.innerHTML = '';
            }
        });

        allergyInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && allergyInput.value.trim() !== "") {
                event.preventDefault();
                addAllergy(allergyInput.value.trim());
                allergyInput.value = "";
                suggestionsBox.innerHTML = ''; // Clear suggestions on enter
            }
        });

        function displaySuggestions(suggestions) {
            suggestionsBox.innerHTML = suggestions.map(allergy => `<div onclick="selectSuggestion('${allergy}')">${allergy}</div>`).join('');
        }

        function selectSuggestion(allergy) {
            addAllergy(allergy);
            allergyInput.value = '';
            suggestionsBox.innerHTML = ''; // Clear suggestions
        }

        function addAllergy(allergy) {
            const label = document.createElement('div');
            label.className = 'allergy-label';
            label.innerHTML = `${allergy} <i class="fas fa-times" onclick="removeAllergy(this)"></i>`;
            allergyContainer.insertBefore(label, allergyInput);
        }

        function removeAllergy(element) {
            element.parentElement.remove();
        }
    </script>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>

</html>
